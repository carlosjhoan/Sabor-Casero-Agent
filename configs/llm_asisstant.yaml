llm:
  # DeepSeek configuration
  api_key: ${DEEPSEEK_API_KEY}
  model: "deepseek-chat"
  temperature: 0.7
  max_tokens: 500
  timeout: 30
  max_retries: 3
  base_url: "https://api.deepseek.com"
  
  # Caching
  enable_cache: true
  cache_max_size: 1000
  cache_ttl: 300  # 5 minutes
  
  # Rate limiting
  max_concurrent: 5
  requests_per_minute: 60
  
  # Logging
  log_level: "INFO"
  log_requests: true
  log_responses: false  # Don't log response content for privacy