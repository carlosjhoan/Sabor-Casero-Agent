# context_manager/guidelines/session_goals.yaml

sessions:
  - id: "S003"
    date: 2026-04-01
    objective: "Implementar Pydantic Output Format para el Extractor (Classifier)"
    priority: high
    status: pending
    description: |
      Actualmente el extractor (classifier) retorna un JSON sin validación de tipos,
      lo que puede causar errores silenciosos y dificulta el mantenimiento.
      
      El modelo Detail ya existe en src/core/classifier/intent.py
      
      Lo que se desea es Mejorar el modelo Detail con:
      
      - Field descriptions para documentación automática
      
      - Valores por defecto para file_source e info_extracted (se llenan después)
      
      - Validadores custom para garantizar calidad del focus
      
      - Luego actualizar el código de parseo para usar model_validate().
    tasks:
      - id: "T011"
        description: "Añadir Field descriptions al modelo Detail"
        status: pending
      - id: "T012"
        description: "Establecer valores por defecto para file_source e info_extracted (cadenas vacías)"
        status: pending
      - id: "T013"
        description: "Implementar field_validator para focus (mínimo 5 palabras, máximo 20 palabras)"
        status: pending
      - id: "T014"
        description: "Crear modelo ClassifierResponse que contenga lista de Detail (si no existe)"
        status: pending
      - id: "T015"
        description: "Verificar que el prompt genere JSON compatible con Detail"
        status: pending
      - id: "T016"
        description: "Actualizar método de parseo para usar Detail.model_validate() en lugar de json.loads()"
        status: pending
      - id: "T017"
        description: "Actualizar código que consume topic_details para usar los modelos tipados"
        status: pending
      - id: "T018"
        description: "Añadir tests para validar serialización/deserialización"
        status: pending
    dependencies:
      - "T011 debe completarse antes que T012"
      - "T015 debe completarse antes que T016"
    notes:
      - "El modelo Detail ya existe, solo necesita mejoras (field descriptions, defaults, validators)"
      - "Los enums QueryType y QueryTopic ya están definidos, reutilizarlos"
      - "Mantener compatibilidad: los campos file_source e info_extracted deben poder ser vacíos inicialmente"
      - "El focus debe tener validación de longitud (5-15 palabras recomendado, mínimo 3, máximo 20)"

  - id: "S004"
    date: 2026-04-12
    objective: "Corregir Orchestrator para que use correctamente ActionPlanner"
    priority: high
    status: completed
    description: |
      El archivo `orchestrator` utiliza por composición la clase `ActionPlanner`,
      pero actualmente está llamando métodos que NO existen en `ActionPlanner`.
      
      En lugar de ejecutar el método correcto (plan_and_execute), está llamando
      métodos como `execute_plan()` y `run_action()` que no están definidos.
      
      Esto impide que el sistema pueda planear y ejecutar acciones correctamente.
      
      Objetivo:
      - Identificar el archivo `orchestrator` (puede ser .py, .ts, etc.)
      - Localizar la línea exacta donde se hace el llamado incorrecto
      - Determinar cuál es el método correcto que DEBERÍA llamarse según `ActionPlanner`
      - Confirmar la lectura y el análisis sin modificar código aún
    tasks:
      - id: "T019"
        description: "Localizar el archivo que contiene la clase Orchestrator"
        status: completed
      - id: "T020"
        description: "Identificar las líneas donde se llama incorrectamente a ActionPlanner"
        status: completed
      - id: "T021"
        description: "Listar los métodos incorrectos que se están llamando"
        status: completed
      - id: "T022"
        description: "Identificar el método correcto que debería usarse (según ActionPlanner)"
        status: completed
      - id: "T023"
        description: "Entregar confirmación de lectura con síntesis del problema"
        status: completed
    dependencies:
      - "T019 debe completarse antes que T020"
      - "T020 debe completarse antes que T021"
      - "T021 debe completarse antes que T022"
    notes:
      - "No modificar ningún código todavía. Solo leer y analizar."
      - "El entregable final es una confirmación de lectura + síntesis del problema"
      - "El formato esperado está definido en el prompt del agente"
      - "Buscar archivos con nombres como: orchestrator.py, orchestrator.ts, orchestrator.js"
    output_required:
      - "Ruta del archivo revisado"
      - "Números de línea del error"
      - "Código incorrecto encontrado"
      - "Método(s) incorrecto(s) llamado(s)"
      - "Método correcto que debería llamarse"
      - "Síntesis de 2-3 líneas del problema"