# context_manager/guidelines/architecture.yaml

architecture_overview:
  description: |
    El proyecto Sabor Casero Assistant sigue una arquitectura limpia (Clean Architecture)
    con separación clara entre Domain, Application e Infrastructure.
    
    Esta separación permite:
    1. Independencia del framework
    2. Testabilidad
    3. Mantenibilidad
    4. Escalabilidad

  layers:
    domain:
      purpose: "Contiene las reglas de negocio puras y modelos de dominio"
      dependencies: "Ninguna (puro Python + Pydantic)"
      examples:
        - "src/core/classifier/intent.py - Modelos Detail, QueryType, QueryTopic"
        - "src/core/order/domain/models.py - Order, OrderItem, ServiceDetails"
      
    application:
      purpose: "Orquesta los casos de uso y coordina el flujo de trabajo"
      dependencies: "Domain (a través de interfaces)"
      examples:
        - "src/core/order/application/orchestrator.py - OrderOrchestrator"
        - "src/core/order/application/processor.py - OrderProcessor"
        - "src/core/classifier/hybrid.py - HybridClassifier"
      
    infrastructure:
      purpose: "Implementaciones concretas de interfaces definidas en Domain"
      dependencies: "Domain + Application (implementa interfaces)"
      examples:
        - "src/core/order/infrastructure/json_order_repository.py"
        - "src/infrastructure/llm_client.py"
        - "src/core/extractor/vector_extractor.py"

  key_principles:
    - "Dependency Rule: Las dependencias solo pueden apuntar hacia adentro (Infrastructure → Application → Domain)"
    - "Interface Segregation: Cada capa expone interfaces claras"
    - "Single Responsibility: Cada componente tiene una única responsabilidad"
    - "Testability: El dominio debe ser testeable sin infraestructura"

  common_patterns:
    - "Repository Pattern: Para acceso a datos (OrderRepository, SessionRepository)"
    - "Factory Pattern: Para creación de objetos (RetrieverFactory)"
    - "Strategy Pattern: Para algoritmos intercambiables (extractors)"
    - "Observer Pattern: Para logging y monitoreo (ConversationLogger)"

  file_structure_conventions:
    - "src/core/{module}/domain/ - Modelos e interfaces de dominio"
    - "src/core/{module}/application/ - Casos de uso y servicios"
    - "src/core/{module}/infrastructure/ - Implementaciones concretas"
    - "src/ui/ - Interfaces de usuario (Gradio, CLI)"
    - "src/infrastructure/ - Infraestructura compartida"